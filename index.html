<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USCC Loop Pattern Recoloring Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --dim: #484f58;
    --green: #238636; --green-hover: #2ea043; --blue: #58a6ff;
    --accent: #1f6feb;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .header { background:var(--surface); border-bottom:2px solid var(--green); padding:18px 28px; }
  .header h1 { font-size:20px; font-weight:700; }
  .header .subtitle { color:var(--blue); font-size:12px; letter-spacing:0.5px; }

  .container { max-width:1100px; margin:0 auto; padding:28px 20px; }

  .section { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:24px; margin-bottom:24px; }
  .section-header { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
  .step-badge { width:28px; height:28px; border-radius:50%; background:var(--green); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; flex-shrink:0; }
  .section-title { font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; }

  /* PATTERN GRID */
  .pattern-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  @media(max-width:600px){ .pattern-grid{grid-template-columns:repeat(2,1fr);} }
  .pattern-card { background:var(--bg); border:2px solid var(--border); border-radius:8px; padding:16px 12px; text-align:center; cursor:pointer; transition:all 0.2s; }
  .pattern-card:hover { border-color:var(--muted); transform:translateY(-2px); }
  .pattern-card.selected { border-color:var(--blue); box-shadow:0 0 0 3px rgba(88,166,255,0.2); }
  .pattern-card .icon { font-size:36px; margin-bottom:6px; display:block; }
  .pattern-card .label { font-size:13px; font-weight:600; }
  .pattern-card.selected .label { color:var(--blue); }
  .pattern-card .sub { font-size:10px; color:var(--dim); margin-top:2px; }

  /* COLOR PALETTE */
  .color-section-label { font-size:11px; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:1px; margin:14px 0 8px 0; }
  .color-section-label:first-of-type { margin-top:0; }
  .custom-row { display:flex; align-items:center; gap:12px; margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid var(--border); }
  .custom-row input[type="color"] { width:44px; height:38px; border:2px solid var(--border); border-radius:6px; background:var(--bg); cursor:pointer; padding:2px; }
  .custom-row input[type="color"]::-webkit-color-swatch-wrapper { padding:0; }
  .custom-row input[type="color"]::-webkit-color-swatch { border:none; border-radius:3px; }
  .hex-box { font-family:'SF Mono',Monaco,monospace; font-size:14px; background:var(--bg); padding:8px 14px; border-radius:6px; border:1px solid var(--border); color:var(--text); font-weight:600; min-width:90px; text-align:center; }
  .color-name-display { font-size:13px; color:var(--muted); }

  .palette-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
  @media(max-width:700px){ .palette-grid{grid-template-columns:repeat(3,1fr);} }
  .swatch { padding:10px 4px; border-radius:6px; cursor:pointer; border:2px solid transparent; text-align:center; transition:all 0.15s; position:relative; }
  .swatch:hover { transform:scale(1.05); z-index:1; }
  .swatch.selected { border-color:#fff; box-shadow:0 0 0 3px rgba(88,166,255,0.4); }
  .swatch .s-name { font-size:9px; font-weight:700; line-height:1.2; margin-bottom:2px; }
  .swatch .s-hex { font-size:8px; font-family:monospace; opacity:0.75; }

  /* EXPORT */
  .export-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
  .export-row label { font-size:13px; color:var(--muted); white-space:nowrap; }
  .export-input { font-family:'SF Mono',Monaco,monospace; font-size:14px; background:var(--bg); padding:8px 14px; border-radius:6px; border:1px solid var(--border); color:var(--text); font-weight:600; width:320px; }
  .export-input:focus { outline:none; border-color:var(--blue); }
  .export-preview { font-size:11px; color:var(--dim); font-family:monospace; }

  .btn { padding:10px 20px; border:none; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .btn-go { background:var(--green); color:#fff; font-size:15px; padding:12px 28px; }
  .btn-go:hover:not(:disabled) { background:var(--green-hover); transform:translateY(-1px); }
  .btn-zip { background:var(--accent); color:#fff; }
  .btn-zip:hover:not(:disabled) { background:#388bfd; }

  .process-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }

  .progress-wrap { margin-top:16px; display:none; }
  .progress-bar { width:100%; height:8px; background:#21262d; border-radius:4px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--green); width:0%; transition:width 0.15s; border-radius:4px; }
  .progress-text { display:flex; justify-content:space-between; margin-top:6px; font-size:12px; color:var(--muted); }
  .progress-text .done { color:#7ee787; }

  /* STATUS */
  .status-bar { margin-top:12px; padding:10px 14px; border-radius:6px; font-size:12px; display:none; }
  .status-bar.loading { background:rgba(88,166,255,0.1); color:var(--blue); display:block; }
  .status-bar.success { background:rgba(35,134,54,0.15); color:#7ee787; display:block; }
  .status-bar.error { background:rgba(218,54,51,0.15); color:#ff7b72; display:block; }

  /* OUTPUT */
  .output-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; max-height:500px; overflow-y:auto; }
  .out-card { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:8px; text-align:center; }
  .out-card .checker { background-image:linear-gradient(45deg,#1a1a2e 25%,transparent 25%),linear-gradient(-45deg,#1a1a2e 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#1a1a2e 75%),linear-gradient(-45deg,transparent 75%,#1a1a2e 75%); background-size:12px 12px; background-position:0 0,0 6px,6px -6px,-6px 0; background-color:#12121f; border-radius:4px; padding:6px; margin-bottom:6px; display:flex; align-items:center; justify-content:center; min-height:80px; }
  .out-card img { max-width:100%; max-height:80px; object-fit:contain; }
  .out-card .fname { font-size:9px; color:var(--muted); margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .hidden { display:none!important; }
  .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.6s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

/* ── Site Nav ── */
.site-nav { display:flex; align-items:center; gap:0; background:#111827; border-bottom:2px solid #1f6feb; padding:0 20px; height:42px; font-family:'Segoe UI',system-ui,-apple-system,sans-serif; position:sticky; top:0; z-index:9998; }
.site-nav .nav-brand { font-size:11px; font-weight:700; color:#8b949e; letter-spacing:1.5px; text-transform:uppercase; margin-right:24px; white-space:nowrap; }
.site-nav a { display:flex; align-items:center; gap:6px; padding:10px 18px; font-size:13px; font-weight:600; color:#8b949e; text-decoration:none; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.15s; white-space:nowrap; }
.site-nav a:hover { color:#e6edf3; background:rgba(255,255,255,0.04); }
.site-nav a.active { color:#58a6ff; border-bottom-color:#1f6feb; }
.site-nav a .nav-icon { font-size:15px; }

</style>

<div class="header">

<div class="container">

  <!-- STEP 1: PATTERN -->
  <div class="section">
    <div class="section-header">
      <div class="step-badge">1</div>
      <div class="section-title">Select Pattern Type</div>
    </div>
    <div class="pattern-grid" id="pattern-grid"></div>
    <div class="status-bar" id="load-status"></div>
  </div>

  <!-- STEP 2: COLOR -->
  <div class="section">
    <div class="section-header">
      <div class="step-badge">2</div>
      <div class="section-title">Select Output Color</div>
    </div>
    <div class="custom-row">
      <span style="font-size:13px;color:var(--muted);">Custom:</span>
      <input type="color" id="custom-color" value="#313bfb">

  </div>

  <!-- STEP 3: EXPORT -->
  <div class="section">

      <button class="btn btn-go" id="process-btn" onclick="processAll()" disabled>⚡ Recolor & Export ZIP</button>

      </div>
    </div>
  </div>

  <!-- OUTPUT PREVIEW -->
  <div class="section hidden" id="output-section">
    <div class="section-header">
      <div class="step-badge" style="background:var(--blue);">✓</div>
      <div class="section-title">Output Preview</div>
    </div>
    <div class="output-grid" id="output-grid"></div>
  </div>

<canvas id="work-canvas" style="display:none;"></canvas>

<script>
// ═══════════════════════════════════════════
// PATTERN CONFIG
// Each pattern: folder name, source file prefix, frame count, frame digits
// ═══════════════════════════════════════════
const PATTERNS = [
  {
    id: "dotted",
    name: "Dotted",
    icon: "⠿",
    folder: "dotted",
    prefix: "Dotted Bright Red",
    frames: 121,    // 00000 to 00120
    digits: 5
  },
  {
    id: "kaleidoscope",
    name: "Kaleidoscope",
    icon: "✦",
    folder: "kaleidoscope",
    prefix: "Kaleidoscopic Optomisitic Red",
    frames: 121,
    digits: 5
  },
  {
    id: "linear",
    name: "Linear",
    icon: "☰",
    folder: "linear",
    prefix: "Linear Bright Blue",
    frames: 121,
    digits: 5
  },
  {
    id: "pointed",
    name: "Pointed",
    icon: "▲",
    folder: "pointed",
    prefix: "Pointed Bold Red",
    frames: 121,
    digits: 5
  },
  {
    id: "stripe",
    name: "Stripe",
    icon: "⫽",
    folder: "stripe",
    prefix: "Stripped Bold Red",
    frames: 121,
    digits: 5
  }
];

// ═══════════════════════════════════════════
// COLORS
// ═══════════════════════════════════════════
const CORE_COLORS = [
  { name:"Optimistic Blue",  hex:"#dbf5ff" },
  { name:"Optimistic Red",   hex:"#ffebfa" },
  { name:"Bright Blue",      hex:"#81eef3" },
  { name:"Bright Red",       hex:"#ffa3d2" },
  { name:"Bold Blue",        hex:"#313bfb" },
  { name:"Bold Red",         hex:"#ff2e18" },
  { name:"Insightful Blue",  hex:"#004f91" },
  { name:"Insightful Red",   hex:"#9a2136" },
  { name:"Impactful Blue",   hex:"#001f5c" },
  { name:"Impactful Red",    hex:"#450012" },
];

const EXT_COLORS = [
  { name:"Optimistic Green",   hex:"#e3ffe3" },
  { name:"Optimistic Yellow",  hex:"#f5f2d6" },
  { name:"Optimistic Purple",  hex:"#f2ebff" },
  { name:"Bright Green",       hex:"#adff6b" },
  { name:"Bright Yellow",      hex:"#fff247" },
  { name:"Bright Purple",      hex:"#d6baff" },
  { name:"Bold Green",         hex:"#00c217" },
  { name:"Bold Orange",        hex:"#ff8300" },
  { name:"Bold Purple",        hex:"#ab91ff" },
  { name:"Insightful Green",   hex:"#42614f" },
  { name:"Insightful Orange",  hex:"#b1570c" },
  { name:"Insightful Purple",  hex:"#594570" },
  { name:"Impactful Green",    hex:"#13342b" },
  { name:"Impactful Orange",   hex:"#6d3614" },
  { name:"Impactful Purple",   hex:"#420a69" },
];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let selectedPattern = null;
let selectedColor = "#313bfb";
let selectedColorName = "Bold Blue";
let loadedImages = []; // { name, img }
let lastZipBlob = null;

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
function init() {
  renderPatterns();
  renderPalette('core-palette', CORE_COLORS);
  renderPalette('ext-palette', EXT_COLORS);

  setTimeout(() => {
    document.querySelectorAll('.swatch').forEach(s => {
      if (s.dataset.hex === '#313bfb') s.classList.add('selected');
    });
  }, 0);

  document.getElementById('custom-color').addEventListener('input', (e) => {
    selectColor(e.target.value, 'Custom');
  });

  document.getElementById('export-prefix').addEventListener('input', updateExportPreview);
}

// ═══════════════════════════════════════════
// PATTERNS
// ═══════════════════════════════════════════
function renderPatterns() {
  const grid = document.getElementById('pattern-grid');
  PATTERNS.forEach(p => {
    const card = document.createElement('div');
    card.className = 'pattern-card';
    card.dataset.id = p.id;
    card.innerHTML = `
      <span class="icon">${p.icon}</span>
      <div class="label">${p.name}</div>
      <div class="sub">${p.frames} frames</div>
    `;
    card.onclick = () => {
      selectedPattern = p;
      document.querySelectorAll('.pattern-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      loadPatternImages(p);
      updateExportPrefix();
    };
    grid.appendChild(card);
  });
}

async function loadPatternImages(pattern) {
  const status = document.getElementById('load-status');
  status.className = 'status-bar loading';
  status.innerHTML = '<span class="spinner"></span> Loading ' + pattern.frames + ' frames from /' + pattern.folder + '/...';

  loadedImages = [];
  let loaded = 0;
  let failed = 0;

  for (let i = 0; i < pattern.frames; i++) {
    const frameNum = String(i).padStart(pattern.digits, '0');
    const filename = pattern.prefix + '_' + frameNum + '.png';
    const path = './patterns/' + pattern.folder + '/' + filename;

    try {
      const img = await loadImage(path);
      loadedImages.push({ name: filename, img, index: i });
      loaded++;
    } catch(e) {
      failed++;
    }

    // Update status every 10 frames
    if (i % 10 === 0 || i === pattern.frames - 1) {
      status.innerHTML = '<span class="spinner"></span> Loading... ' + (loaded + failed) + '/' + pattern.frames +
        (failed > 0 ? ' <span style="color:#ff7b72">(' + failed + ' failed)</span>' : '');
    }
  }

  if (failed === pattern.frames) {
    status.className = 'status-bar error';
    status.innerHTML = '❌ Could not load any frames. Check that files exist at:<br><code>./patterns/' + pattern.folder + '/' + pattern.prefix + '_00000.png</code>';
  } else if (failed > 0) {
    status.className = 'status-bar success';
    status.innerHTML = '✅ Loaded ' + loaded + ' frames (' + failed + ' failed)';
  } else {
    status.className = 'status-bar success';
    status.innerHTML = '✅ ' + loaded + ' frames ready';
  }

  updateProcessBtn();
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

// ═══════════════════════════════════════════
// COLORS
// ═══════════════════════════════════════════
function renderPalette(containerId, colors) {
  const grid = document.getElementById(containerId);
  colors.forEach(c => {
    const div = document.createElement('div');
    div.className = 'swatch';
    div.style.backgroundColor = c.hex;
    div.dataset.hex = c.hex;
    div.dataset.name = c.name;
    const lum = getLuminance(c.hex);
    const tc = lum > 0.45 ? '#000' : '#fff';
    div.innerHTML = `<div class="s-name" style="color:${tc}">${c.name}</div><div class="s-hex" style="color:${tc}">${c.hex}</div>`;
    div.onclick = () => {
      selectColor(c.hex, c.name);
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      div.classList.add('selected');
    };
    grid.appendChild(div);
  });
}

function selectColor(hex, name) {
  selectedColor = hex;
  selectedColorName = name || 'Custom';
  document.getElementById('custom-color').value = hex;
  document.getElementById('hex-display').textContent = hex;
  document.getElementById('color-name-display').textContent = name || '';
  if (name === 'Custom') {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  }
  updateExportPrefix();
}

function getLuminance(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return 0.299*r + 0.587*g + 0.114*b;
}

// ═══════════════════════════════════════════
// EXPORT PREFIX
// ═══════════════════════════════════════════
function updateExportPrefix() {
  const patternName = selectedPattern ? selectedPattern.name : '';
  const prefix = patternName + (patternName ? ' ' : '') + selectedColorName;
  document.getElementById('export-prefix').value = prefix;
  updateExportPreview();
}

function updateExportPreview() {
  const prefix = document.getElementById('export-prefix').value || 'output';
  const digits = selectedPattern ? selectedPattern.digits : 5;
  document.getElementById('export-preview').textContent = '→ ' + prefix + '_' + '0'.repeat(digits) + '.png';
}

// ═══════════════════════════════════════════
// PROCESSING
// ═══════════════════════════════════════════
function updateProcessBtn() {
  document.getElementById('process-btn').disabled = !(loadedImages.length > 0);
}

async function processAll() {
  if (loadedImages.length === 0) return;

  const canvas = document.getElementById('work-canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const progressWrap = document.getElementById('progress-wrap');
  const progressFill = document.getElementById('progress-fill');
  const progressLabel = document.getElementById('progress-label');
  const progressPct = document.getElementById('progress-pct');
  const processBtn = document.getElementById('process-btn');

  processBtn.disabled = true;
  processBtn.innerHTML = '<span class="spinner"></span> Processing...';
  progressWrap.style.display = 'block';
  progressFill.style.width = '0%';

  const tR = parseInt(selectedColor.slice(1,3), 16);
  const tG = parseInt(selectedColor.slice(3,5), 16);
  const tB = parseInt(selectedColor.slice(5,7), 16);

  const prefix = document.getElementById('export-prefix').value || 'output';
  const digits = selectedPattern ? selectedPattern.digits : 5;
  const total = loadedImages.length;

  const zip = new JSZip();
  const folder = zip.folder(prefix.replace(/[\s]+/g, '_'));
  const outputPreviews = [];

  for (let i = 0; i < total; i++) {
    const src = loadedImages[i];

    canvas.width = src.img.naturalWidth;
    canvas.height = src.img.naturalHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(src.img, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    // Grayscale → Colorize (full color replace)
    // Use max channel so colored areas map to full target intensity
    for (let p = 0; p < data.length; p += 4) {
      if (data[p+3] === 0) continue; // skip fully transparent pixels
      data[p]   = tR;
      data[p+1] = tG;
      data[p+2] = tB;
      // alpha unchanged
    }

    ctx.putImageData(imageData, 0, 0);

    const frameNum = String(src.index).padStart(digits, '0');
    const outName = prefix + '_' + frameNum + '.png';

    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    folder.file(outName, blob);

    if (i < 12) {
      const url = URL.createObjectURL(blob);
      outputPreviews.push({ name: outName, url });
    }

    const pct = Math.round(((i+1) / total) * 100);
    progressFill.style.width = pct + '%';
    progressLabel.textContent = 'Processing ' + (i+1) + ' of ' + total + '...';
    progressPct.textContent = pct + '%';

    if (i % 3 === 0) await new Promise(r => setTimeout(r, 5));
  }

  progressLabel.textContent = 'Building ZIP...';
  lastZipBlob = await zip.generateAsync({ type:'blob' }, (meta) => {
    progressPct.textContent = 'ZIP ' + meta.percent.toFixed(0) + '%';
  });

  saveAs(lastZipBlob, prefix.replace(/[\s]+/g, '_') + '.zip');

  progressLabel.innerHTML = '<span class="done">✅ Done! ' + total + ' images recolored → ZIP downloaded</span>';
  progressPct.textContent = '100%';
  processBtn.disabled = false;
  processBtn.innerHTML = '⚡ Recolor & Export ZIP';
  document.getElementById('zip-btn').classList.remove('hidden');

  renderOutput(outputPreviews, total);
}

function renderOutput(previews, total) {
  const section = document.getElementById('output-section');
  const grid = document.getElementById('output-grid');
  section.classList.remove('hidden');
  grid.innerHTML = '';

  previews.forEach(o => {
    const div = document.createElement('div');
    div.className = 'out-card';
    div.innerHTML = `
      <div class="checker"><img src="${o.url}" alt="${o.name}"></div>
      <div class="fname" title="${o.name}">${o.name}</div>
    `;
    grid.appendChild(div);
  });

  if (total > previews.length) {
    const more = document.createElement('div');
    more.className = 'out-card';
    more.style.display = 'flex';
    more.style.alignItems = 'center';
    more.style.justifyContent = 'center';
    more.style.color = 'var(--dim)';
    more.style.fontSize = '13px';
    more.textContent = '+' + (total - previews.length) + ' more in ZIP';
    grid.appendChild(more);
  }
}

function downloadZip() {
  if (lastZipBlob) {
    const prefix = document.getElementById('export-prefix').value || 'output';
    saveAs(lastZipBlob, prefix.replace(/[\s]+/g, '_') + '.zip');
  }
}

// BOOT
init();
</script>
</body>
